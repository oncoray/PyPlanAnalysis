name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/**'          # rebuild if source code (docstrings) changes too
      - '.github/workflows/docs.yml'
  workflow_dispatch:        # allows manual trigger from the Actions tab

permissions:
  contents: write            # needed to push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install sphinx sphinx-rtd-theme   # adjust to match your conf.py extensions/theme
          # If you keep doc requirements in a file, use that instead, e.g.:
          # pip install -r docs/requirements.txt

      - name: Build Sphinx docs
        run: sphinx-build -b html docs/source docs/_build/html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html