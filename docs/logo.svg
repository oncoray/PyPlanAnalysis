<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="curveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- icon: DVH-style descending curve on axes -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="160" height="160" rx="14" fill="#0f172a"/>

    <!-- axes -->
    <line x1="28" y1="20" x2="28" y2="132" stroke="#64748b" stroke-width="2"/>
    <line x1="28" y1="132" x2="140" y2="132" stroke="#64748b" stroke-width="2"/>

    <!-- DVH curve 1: target — well-covered flat top, smooth shoulder, steep fall, no overdose tail -->
    <path d="M 28 22 L 100 22 C 110 22, 115 24, 119 34 C 124 48, 127 64, 130 80 C 133 98, 136 112, 138 122 C 139 127, 140 130, 140 132"
          fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
    <path d="M 28 22 L 100 22 C 110 22, 115 24, 119 34 C 124 48, 127 64, 130 80 C 133 98, 136 112, 138 122 C 139 127, 140 130, 140 132 L 28 132 Z"
          fill="url(#curveFill)" stroke="none"/>

    <!-- DVH curve 2: OAR — spared, falls off in the lower-dose region -->
    <path d="M 28 22 C 42 22, 50 32, 56 46 C 64 64, 74 84, 96 108 C 108 120, 120 126, 140 130"
          fill="none" stroke="#0891b2" stroke-width="3" stroke-linecap="round"/>

    <!-- DVH curve 3: well-spared OAR — even earlier, steeper drop into low dose -->
    <path d="M 28 22 C 36 22, 40 36, 44 48 C 50 68, 58 88, 74 106 C 88 120, 108 128, 140 131"
          fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(200,0)">
    <text x="0" y="95" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#0f172a">Py<tspan fill="#2563eb">Plan</tspan>Analysis</text>
    <text x="2" y="122" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#64748b" letter-spacing="0.5">DVH · LVH · DLVH · NTCP for proton therapy</text>
  </g>
</svg>
